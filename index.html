<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Monitoring | Bright Path</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    /* HEADER */
    .header {
      background: #0047AB;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    /* VIDEO SECTION */
    .video-container {
      width: 95%;
      margin: 20px auto;
      position: relative;
      background: black;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    /* BLACK RIBBON */
    .ribbon {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 10px;
      font-size: 14px;
      text-align: center;
      z-index: 10;
      letter-spacing: 1px;
    }

    /* IMAGE SECTION */
    .image-section {
      width: 95%;
      margin: 20px auto;
    }

    .image-title {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
    }

    /* VERTICAL IMAGES */
    .image-list img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .image-list img:hover {
      transform: scale(1.02);
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    Bright Path Innovators - Live Monitoring
  </div>

  <!-- VIDEO SECTION -->
  <div class="video-container">

    <!-- BLACK RIBBON -->
    <div class="ribbon">
      LIVE PROCTORING IN PROGRESS | DO NOT REFRESH OR CLOSE
    </div>

    <iframe src="https://vdo.ninja/?push=BdiKWhA&label=mettl"
      allow="camera; microphone; fullscreen;">
    </iframe>

  </div>

  <!-- IMAGE SECTION -->
  <div class="image-section">
    <div class="image-title">Instructions / Guidelines</div>

    <div class="image-list">
      <img src="image1.jpg" alt="Instruction 1">
      <img src="image2.jpg" alt="Instruction 2">
      <img src="image3.jpg" alt="Instruction 3">
      <img src="image4.jpg" alt="Instruction 4">
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Bright Path Innovators Pvt. Ltd.
  </div>

</body>
</html>
